# OpenUpdater recipe template
# ============================
# A recipe tells OpenUpdater how to find the latest version of one app.
# Place real recipes in OpenUpdater/Recipes/ as `<bundle-id>.yml` (the filename
# stem MUST equal the app's CFBundleIdentifier, e.g. com.mitchellh.ghostty.yml).
# Recipes are plain YAML — keep comments out of real recipe files; this template
# is the only place field docs live.
#
# A recipe is only needed when an app can't be checked automatically. Apps that
# expose a static SUFeedURL in their Info.plist are auto-detected (Sparkle) with
# no recipe. Use a recipe to: cover a non-Sparkle app (GitHub releases), name a
# Sparkle feed for an app that sets it dynamically, or override an app's own feed.
#
# Placeholders (usable in download.url, changelog.url, check.url/feed/pattern/path):
#   {tag}      the raw upstream tag/version, e.g. "v0.20.3-Beta"
#   {version}      the normalized version after `version` rules, e.g. "0.20.3-Beta"
#   {major} {minor} {patch}   individual dot components, e.g. "5.1.2" -> 5 / 1 / 2
#                  (combine as needed, e.g. a major.minor folder is "{major}.{minor}")
#   {arch}         the running Mac's arch string (see the `arch:` map below)
#
# ----------------------------------------------------------------------------

# REQUIRED. Bundle identifier. Must match the filename stem.
id: com.example.App

# Optional. Human-readable name (informational only; the app's own name is used
# in the UI). Helpful for recipe authors.
name: Example App

# Optional. Project or vendor page (informational).
homepage: https://example.com

# Optional. Maps the running Mac's architecture to the string this app uses in the
# `{arch}` placeholder. The keys are always `arm64` and `x86_64` (the host arch).
# Omit this entirely if the app uses `arm64` / `x86_64` verbatim — `{arch}` then
# defaults to those. Provide it only for apps with their own naming (x64, aarch64,
# amd64, intel64, ARM64, …). Example for an app that ships `…-x64.dmg` on Intel:
# arch:
#   arm64: arm64
#   x86_64: x64

# REQUIRED. How to discover the latest version.
check:
  # REQUIRED. One of:
  #   github_releases  — read a GitHub repo's Releases
  #   sparkle          — read a Sparkle appcast feed
  #   html             — fetch a page, extract the version with a regex
  #   xml              — fetch XML, extract the version with a regex
  #   json             — fetch JSON, extract the version with a key path
  #   yaml             — fetch YAML (e.g. electron's latest-mac.yml) via a key path
  #   redirect         — follow a "latest" download redirect, read the version from
  #                      the final URL (e.g. Slack). The resolved URL is the download.
  type: github_releases

  # github_releases ONLY. "owner/name" of the repo.
  repo: example/app

  # github_releases ONLY. Include pre-release/beta tags when choosing the latest.
  # Default: false.
  prereleases: false

  # github_releases ONLY, OPTIONAL. Tag filters, applied before the newest release
  # is chosen — use them to skip rolling tags like "continuous"/"nightly"/"latest"
  # that some projects publish alongside real versioned releases.
  #   tag_pattern: only consider releases whose tag matches this regex.
  #   tag_ignore:  skip releases whose tag matches this regex.
  # A tag must match tag_pattern (if set) AND not match tag_ignore (if set).
  # tag_pattern: '^v\d'
  # tag_ignore: '^(continuous|nightly|latest)$'

  # sparkle ONLY. Explicit appcast URL. Use this for apps that bundle Sparkle but
  # set their feed in code (no static SUFeedURL). For sparkle, OpenUpdater compares
  # build numbers (sparkle:version / CFBundleVersion), so `version` below is ignored.
  # feed: https://example.com/appcast.xml

  # html / xml / json / redirect. The page, API, or redirecting endpoint to fetch.
  # url: https://example.com/latest

  # html / xml / redirect. Regex whose first capture group is the version. (`version`
  # rules below still apply afterward.) For html/xml it matches the response body;
  # for redirect it matches the final URL after redirects, so the version embedded in
  # a download path is captured without downloading the file.
  #   html / xml:   pattern: 'Version (\d+\.\d+\.\d+)'
  #   redirect:     pattern: '/universal/([0-9.]+)/'

  # json / yaml ONLY. Dotted key path to the version (array indices allowed, e.g.
  # "assets.0.name"). For electron latest-mac.yml this is just "version".
  # An "[field=value]" segment selects the first array element whose field equals
  # value — e.g. "releases.[fraction=1].version" picks Chrome's fully-rolled-out
  # release, matching what its static download actually serves (the newest version
  # may still be at a partial staged rollout the download URL doesn't serve yet).
  # Comma-separate conditions to require all of them, e.g. "[fraction=1,os=mac]".
  # path: version

  # html / xml ONLY, OPTIONAL. Which match to use when `pattern` matches more than
  # once: `first` (document order, the default) or `latest` (the highest version
  # among all matches, comparing every run of digits — so "4.5.10" beats "4.5.9").
  # select: latest

  # html / xml / json / yaml ONLY, OPTIONAL. Resolve `{name}` placeholders from other
  # pages before this check runs, then substitute them into check.url and the
  # download / changelog templates. Use it to discover a value (e.g. the current
  # release series) instead of pinning it in the recipe. Each step fetches its `url`
  # as text and extracts capture group 1 of `pattern`; `select` (first|latest) picks
  # the match. Example — track Blender's newest LTS series without hardcoding it:
  # url: https://www.blender.org/download/lts/{series}/
  # select: latest
  # resolve:
  #   series:
  #     url: https://www.blender.org/download/lts/
  #     pattern: '/download/lts/([0-9-]+)/'
  #     select: latest

  # html / xml / json / yaml ONLY, OPTIONAL. Pull the download URL straight from
  # the same response instead of (or in addition to) the `download.url` template
  # below. Enables plain HTTP(S) downloads where the link isn't predictable. An
  # extracted value may be a relative path — it's resolved against `url`.
  #   html / xml:   download_pattern: 'href="([^"]+\.dmg)"'
  #   json / yaml:  download_path: path

# Optional. Override how the INSTALLED version is read, instead of the default
# CFBundleShortVersionString. Needed for apps that ship a static placeholder (e.g.
# WezTerm hardcodes CFBundleShortVersionString to "0.1.0" forever) or format their
# version unlike the upstream feed (e.g. Zoom's plist says "7.1.0 (83064)" while its
# feed says "7.1.0.83064"). Without this, such apps perpetually show a phantom update.
#
# The raw value comes from `command` (a bundled binary's output) OR `key` (a specific
# Info.plist key); `pattern` then optionally extracts the comparable version from it.
#
# Example — read from a binary (WezTerm):
installed_version:
  # Path to the executable, relative to the .app bundle.
  command: Contents/MacOS/wezterm
  # Arguments passed to it (optional).
  args:
    - --version
  # Regex whose first capture group is the version. Omit to use the raw value as-is.
  pattern: 'wezterm (\S+)'
#
# Example — read a different Info.plist key (Zoom), no pattern needed:
# installed_version:
#   key: CFBundleVersion

# Optional (github_releases). How to turn a raw tag into a comparable version.
version:
  # Leading text to strip from the tag, e.g. "v" turns "v1.2.3" into "1.2.3".
  strip_prefix: v
  # Optional regex; the first capture group becomes the version. Applied after
  # strip_prefix. Omit unless the tag needs extracting from surrounding text.
  # pattern: '(\d+\.\d+\.\d+)'

# Optional. Where to fetch the new build, for the one-click installer. Use {arch}
# for arch-specific assets (see the `arch:` map above). Omit this whole block for a
# "check-only" recipe: OpenUpdater still detects and shows new versions (with the
# changelog link) but leaves the Update button disabled — useful for apps that have
# no predictable download or update through their own installer.
download:
  # The download URL. OPTIONAL — omit it when the URL is pulled from the response
  # via check.download_pattern / download_path; then this block just sets `format`.
  url: https://github.com/example/app/releases/download/{tag}/App-{version}-{arch}.dmg
  # One of: dmg | zip | pkg | tar (tar covers .tar / .tar.gz / .tgz / .tar.xz /
  # .tar.bz2). Usually inferred from the URL's extension; set it when the URL has no
  # recognizable extension.
  format: dmg

# Optional. Release-notes link. For sparkle, the appcast's own release-notes link
# is used automatically and this is only a fallback.
changelog:
  url: https://github.com/example/app/releases/tag/{tag}

# Optional. Release streams the user can choose between (e.g. Stable vs ESR/LTS).
# Omit this whole block for a normal single-stream app. When present, the user picks
# a channel per app (right-click → Release Channel); the choice is remembered. The
# FIRST channel is the default. A channel's `check`/`download`, when given, REPLACE
# the base blocks above for that channel; fields it omits inherit the base — so the
# default channel usually needs only an id and name. Example (Firefox Stable + ESR):
# channels:
#   - id: stable
#     name: Stable
#   - id: esr
#     name: ESR
#     check:
#       type: json
#       url: https://product-details.mozilla.org/1.0/firefox_versions.json
#       path: FIREFOX_ESR
#     download:
#       url: "https://download.mozilla.org/?product=firefox-esr-latest-ssl&os=osx&lang=en-US"
#       format: dmg
