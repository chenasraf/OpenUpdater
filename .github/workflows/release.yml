name: Release

# Flow:
#  1. Every push to master runs release-please, which opens/updates a release PR
#     (as github-actions[bot], using the default GITHUB_TOKEN — no PAT needed).
#  2. Merging that PR pushes to master, release-please cuts the GitHub release + tag,
#     and the build job (gated on release_created) signs, notarizes, packages a DMG,
#     and uploads it to the release.
#  workflow_dispatch lets you (re)build + attach a DMG to an existing release tag.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build & attach a DMG to (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Default token => the github-actions[bot] opens the release PR.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: macos-15
    permissions:
      contents: write
    env:
      TEAM_ID: Y893L6NQP2
    steps:
      - name: Resolve tag & version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ needs.release-please.outputs.tag_name }}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Archive (Developer ID signed)
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project OpenUpdater.xcodeproj \
            -scheme OpenUpdater \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/OpenUpdater.xcarchive" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Verify signature & package DMG
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/OpenUpdater.xcarchive/Products/Applications/OpenUpdater.app"
          # The archive is already Developer ID-signed (hardened runtime + secure
          # timestamp), so use it directly — newer Xcode's -exportArchive rejects the
          # "developer-id" method.
          codesign --verify --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 | grep -E "Authority=|TeamIdentifier=" || true
          STAGE="$RUNNER_TEMP/dmg"
          DMG="$RUNNER_TEMP/OpenUpdater-${VERSION}.dmg"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "OpenUpdater" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Notarize & staple
        env:
          API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
          API_KEY_P8_BASE64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Upload DMG to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" "$DMG" --clobber
