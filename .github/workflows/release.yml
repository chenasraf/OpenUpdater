name: Release

# Flow:
#  1. Every push to master runs release-please, which opens/updates a release PR
#     (as github-actions[bot], using the default GITHUB_TOKEN — no PAT needed).
#  2. Merging that PR pushes to master, release-please cuts the GitHub release + tag,
#     and the build job (gated on release_created) signs, notarizes, packages a DMG,
#     and uploads it to the release.
#  workflow_dispatch lets you (re)build + attach a DMG to an existing release tag.

on:
  push:
    branches: [master]
    # The appcast is committed back by this workflow — don't let that re-trigger it.
    paths-ignore: [appcast.xml]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build & attach a DMG to (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Default token => the github-actions[bot] opens the release PR.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: macos-15
    permissions:
      contents: write
    env:
      TEAM_ID: Y893L6NQP2
    steps:
      - name: Resolve tag & version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ needs.release-please.outputs.tag_name }}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Archive (Developer ID signed)
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project OpenUpdater.xcodeproj \
            -scheme OpenUpdater \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/OpenUpdater.xcarchive" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Re-sign Sparkle helpers, verify & package DMG
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/OpenUpdater.xcarchive/Products/Applications/OpenUpdater.app"
          SIGN_ID="Developer ID Application"
          SF="$APP/Contents/Frameworks/Sparkle.framework"
          SFV="$SF/Versions/B"
          # Sparkle ships its nested helpers ad-hoc-signed. We don't run -exportArchive
          # (newer Xcode rejects the "developer-id" method), so nothing re-signs them and
          # the notary rejects the ad-hoc code. Re-sign inside-out with Developer ID +
          # hardened runtime + secure timestamp, preserving each component's entitlements.
          for c in \
            "$SFV/XPCServices/Downloader.xpc" \
            "$SFV/XPCServices/Installer.xpc" \
            "$SFV/Autoupdate" \
            "$SFV/Updater.app" \
            "$SF"; do
            codesign --force --options runtime --timestamp \
              --preserve-metadata=entitlements --sign "$SIGN_ID" "$c"
          done
          # Re-seal the whole app over the freshly-signed nested code.
          codesign --force --options runtime --timestamp \
            --preserve-metadata=entitlements --sign "$SIGN_ID" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 | grep -E "Authority=|TeamIdentifier=" || true
          STAGE="$RUNNER_TEMP/dmg"
          DMG="$RUNNER_TEMP/OpenUpdater-${VERSION}.dmg"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "OpenUpdater" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Notarize & staple
        env:
          API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
          API_KEY_P8_BASE64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          SUBMIT_JSON="$RUNNER_TEMP/notary-submit.json"
          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait --output-format json | tee "$SUBMIT_JSON"
          SUB_ID="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["id"])' "$SUBMIT_JSON")"
          STATUS="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["status"])' "$SUBMIT_JSON")"
          # Always dump the detailed log — it lists every binary the notary rejected.
          echo "=== notarytool log ($STATUS) ==="
          xcrun notarytool log "$SUB_ID" \
            --key "$KEY_PATH" --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID" || true
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization was $STATUS — see the log above."
            exit 1
          fi
          xcrun stapler staple "$DMG"

      - name: Upload DMG to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" "$DMG" --clobber

      - name: Sign update & update Sparkle appcast
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Sparkle's signing tools.
          SPARKLE_VERSION=2.6.4
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJ -C "$RUNNER_TEMP"
          echo "$SPARKLE_ED_PRIVATE_KEY" | base64 --decode > "$RUNNER_TEMP/sparkle_key"

          # sign_update prints: sparkle:edSignature="…" length="…"
          SIG="$("$RUNNER_TEMP/bin/sign_update" --ed-key-file "$RUNNER_TEMP/sparkle_key" "$DMG")"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/$(basename "$DMG")"
          NOTES_LINK="https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          PUBDATE="$(LC_ALL=C date -u +'%a, %d %b %Y %H:%M:%S +0000')"

          # Embed just the release changelog in the appcast so Sparkle shows the
          # actual notes, not the whole GitHub release page. release-please writes
          # the changelog into the release body; render it to HTML via GitHub's API.
          gh release view "$TAG" --json body -q .body > "$RUNNER_TEMP/notes.md"
          if [ -s "$RUNNER_TEMP/notes.md" ]; then
            gh api --method POST /markdown -f mode=gfm -F text=@"$RUNNER_TEMP/notes.md" \
              > "$RUNNER_TEMP/notes.html"
          else
            : > "$RUNNER_TEMP/notes.html"
          fi

          cat > "$RUNNER_TEMP/item.xml" <<ITEM
            <item>
              <title>${VERSION}</title>
              <pubDate>${PUBDATE}</pubDate>
              <sparkle:version>${{ github.run_number }}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
              __NOTES__
              <enclosure url="${DMG_URL}" ${SIG} type="application/octet-stream"/>
            </item>
          ITEM

          # Commit the new item onto master's appcast.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -B master origin/master
          NOTES_LINK="$NOTES_LINK" python3 - "$RUNNER_TEMP/item.xml" "$RUNNER_TEMP/notes.html" <<'PY'
          import os, sys
          item = open(sys.argv[1]).read()
          html = open(sys.argv[2]).read().strip()
          if html:
              # Wrap the rendered changelog in CDATA; neutralise any literal "]]>".
              cdata = "<![CDATA[" + html.replace("]]>", "]]]]><![CDATA[>") + "]]>"
              notes = "<description>" + cdata + "</description>"
          else:
              # No body to render — fall back to linking the GitHub release page.
              notes = "<sparkle:releaseNotesLink>" + os.environ["NOTES_LINK"] + "</sparkle:releaseNotesLink>"
          item = item.replace("__NOTES__", notes)
          xml = open("appcast.xml").read()
          open("appcast.xml", "w").write(xml.replace("  </channel>", item + "  </channel>", 1))
          PY
          git add appcast.xml
          git commit -m "chore: update appcast for ${TAG}"
          git push origin master
