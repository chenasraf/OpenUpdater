id: org.blenderfoundation.blender
name: Blender
homepage: https://www.blender.org

arch:
  arm64: arm64
  x86_64: x64

check:
  type: html
  url: https://www.blender.org/download/
  pattern: 'Blender (\d+\.\d+\.\d+)'

download:
  url: https://download.blender.org/release/Blender{major}.{minor}/blender-{version}-macos-{arch}.dmg
  format: dmg

channels:
  - id: latest
    name: Latest
  - id: lts
    name: LTS
    check:
      type: html
      url: https://www.blender.org/download/lts/{series}/
      pattern: 'Blender (\d+\.\d+\.\d+)'
      select: latest
      resolve:
        series:
          url: https://www.blender.org/download/lts/
          pattern: '/download/lts/([0-9-]+)/'
          select: latest
