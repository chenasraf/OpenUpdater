id: com.1password.1password
name: 1Password
homepage: https://1password.com

arch:
  arm64: aarch64
  x86_64: x86_64

check:
  type: html
  url: https://releases.1password.com/mac/stable/
  pattern: 'Updated to (\d+\.\d+\.\d+)'
  select: latest

download:
  url: https://c.1password.com/dist/1P/mac{major}/1Password-{version}-{arch}.zip

channels:
  - id: stable
    name: Stable
  - id: beta
    name: Beta
    check:
      type: html
      url: https://releases.1password.com/mac/beta/
      pattern: 'Updated to (\d+\.\d+\.\d+)'
      select: latest
